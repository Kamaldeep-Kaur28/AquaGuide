<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqua Explorer | Deep Ocean Secrets</title>
    <!-- Modern Font for a clean look -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            /* Stunning deep ocean gradient */
            background: linear-gradient(to bottom, #001a33 0%, #004b87 50%, #0088d1 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #ffffff;
            position: relative;
        }

        /* Light rays from the surface effect */
        .light-rays {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                45deg,
                rgba(255, 255, 255, 0.03) 0%,
                rgba(255, 255, 255, 0.03) 5%,
                transparent 5%,
                transparent 10%
            );
            z-index: 1;
            pointer-events: none;
        }

        /* Animated Bubbles */
        .bubble {
            position: absolute;
            bottom: -50px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.4);
            animation: floatUp 8s infinite ease-in;
            z-index: 2;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.8); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-120vh) scale(1.5); opacity: 0; }
        }

        /* Glassmorphism Hero Card */
        .hero-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); /* For Safari */
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            max-width: 650px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: floatCard 6s ease-in-out infinite;
        }

        /* Floating animation for the central card */
        @keyframes floatCard {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #e0f7fa;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            letter-spacing: 2px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.7;
            color: #b2ebf2;
            margin-bottom: 30px;
        }

        .cta-text {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #80deea;
            font-weight: 700;
            background: rgba(0, 0, 0, 0.25);
            display: inline-block;
            padding: 12px 25px;
            border-radius: 30px;
            border: 1px solid rgba(128, 222, 234, 0.2);
            transition: all 0.3s ease;
        }

        .cta-text:hover {
            background: rgba(0, 0, 0, 0.4);
            border-color: rgba(128, 222, 234, 0.5);
        }
    </style>
</head>
<body>

    <!-- Underwater Light Rays -->
    <div class="light-rays"></div>

    <!-- Rising Animated Bubbles -->
    <div class="bubble" style="left: 10%; width: 30px; height: 30px; animation-duration: 7s; animation-delay: 1s;"></div>
    <div class="bubble" style="left: 25%; width: 15px; height: 15px; animation-duration: 5s; animation-delay: 2s;"></div>
    <div class="bubble" style="left: 50%; width: 40px; height: 40px; animation-duration: 9s; animation-delay: 0s;"></div>
    <div class="bubble" style="left: 75%; width: 25px; height: 25px; animation-duration: 6s; animation-delay: 3s;"></div>
    <div class="bubble" style="left: 90%; width: 20px; height: 20px; animation-duration: 8s; animation-delay: 1.5s;"></div>

    <!-- Main Content Container -->
    <div class="hero-card">
        <h1>Aqua Explorer</h1>
        <p>Descend into the greatest mysteries of our planet. Discover mesmerizing marine life, explore uncharted depths, and interact with our AI Ocean Guide.</p>
        <div class="cta-text">Click the Chat Icon to Dive In 🌊</div>
    </div>

    <!-- 🔥 WATSON CHATBOT SCRIPT (Provided by User) 🔥 -->
    <script>
      window.watsonAssistantChatOptions = {
        integrationID: "d1494679-4cd3-4ea0-bb19-01059fcbebd5", // The ID of this integration.
        region: "https://integrations.eu-de.assistant.watson.appdomain.cloud", // The region your integration is hosted in.
        serviceInstanceID: "07759be1-4cde-4477-8582-0f1ddeaba834", // The ID of your service instance.
        onLoad: async (instance) => { await instance.render(); }
      };
      setTimeout(function(){
        const t=document.createElement('script');
        t.src="https://web-chat.global.assistant.watson.appdomain.cloud/versions/" + (window.watsonAssistantChatOptions.clientVersion || 'latest') + "/WatsonAssistantChatEntry.js";
        document.head.appendChild(t);
      });
    </script>

</body>
</html>
