<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqua Explorer | Deep Ocean Secrets</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            /* Deep Ocean Gradient Background */
            background: linear-gradient(to bottom, #001220 0%, #003366 40%, #006699 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #ffffff;
            position: relative;
        }

        /* Underwater Light Rays */
        .light-rays {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                45deg,
                rgba(255, 255, 255, 0.02) 0%,
                rgba(255, 255, 255, 0.02) 5%,
                transparent 5%,
                transparent 10%
            );
            z-index: 1;
            pointer-events: none;
        }

        /* ---------------- ANIMATED SEA CREATURES ---------------- */
        .sea-creature {
            position: absolute;
            z-index: 2;
            user-select: none;
            pointer-events: none;
            filter: drop-shadow(0px 10px 10px rgba(0,0,0,0.5));
        }

        /* The Big Blue Whale */
        .whale {
            font-size: 8rem;
            top: 15%;
            animation: swimRight 45s linear infinite;
            opacity: 0.7;
        }

        /* Dangerous Shark */
        .shark {
            font-size: 6rem;
            bottom: 20%;
            animation: swimRight 30s linear infinite 10s;
            opacity: 0.8;
        }

        /* Tropical Fishes */
        .fish1 {
            font-size: 4rem;
            top: 35%;
            animation: swimLeft 25s linear infinite;
        }

        .fish2 {
            font-size: 3rem;
            top: 65%;
            animation: swimLeft 20s linear infinite 5s;
        }

        /* Sea Turtle */
        .turtle {
            font-size: 5rem;
            bottom: 10%;
            animation: swimLeft 50s linear infinite 15s;
            opacity: 0.9;
        }

        /* Jellyfish moving slightly upwards */
        .jellyfish {
            font-size: 4rem;
            right: 20%;
            bottom: -10%;
            animation: floatUpSlow 20s linear infinite;
            opacity: 0.6;
        }

        /* Swimming Animations */
        @keyframes swimRight {
            0% { left: -20%; transform: scaleX(1) translateY(0); }
            50% { transform: scaleX(1) translateY(-30px); }
            100% { left: 120%; transform: scaleX(1) translateY(0); }
        }

        @keyframes swimLeft {
            0% { left: 120%; transform: scaleX(-1) translateY(0); }
            50% { transform: scaleX(-1) translateY(30px); }
            100% { left: -20%; transform: scaleX(-1) translateY(0); }
        }

        @keyframes floatUpSlow {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-120vh); opacity: 0; }
        }

        /* ---------------- BUBBLES ---------------- */
        .bubble {
            position: absolute;
            bottom: -50px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.3);
            animation: floatUpBubbles 8s infinite ease-in;
            z-index: 3;
        }

        @keyframes floatUpBubbles {
            0% { transform: translateY(0) scale(0.8); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-120vh) scale(1.5); opacity: 0; }
        }

        /* ---------------- GLASS UI CARD ---------------- */
        .hero-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            max-width: 650px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            animation: floatCard 6s ease-in-out infinite;
        }

        @keyframes floatCard {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #e0f7fa;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            letter-spacing: 2px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.7;
            color: #b2ebf2;
            margin-bottom: 30px;
        }

        .cta-text {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #80deea;
            font-weight: 700;
            background: rgba(0, 0, 0, 0.3);
            display: inline-block;
            padding: 12px 25px;
            border-radius: 30px;
            border: 1px solid rgba(128, 222, 234, 0.3);
            transition: all 0.3s ease;
        }

        .cta-text:hover {
            background: rgba(0, 0, 0, 0.5);
            border-color: rgba(128, 222, 234, 0.6);
            box-shadow: 0 0 15px rgba(128, 222, 234, 0.4);
        }
    </style>
</head>
<body>

    <!-- Light Rays -->
    <div class="light-rays"></div>

    <!-- 🌊 ANIMATED SEA CREATURES 🌊 -->
    <div class="sea-creature whale">🐋</div>
    <div class="sea-creature shark">🦈</div>
    <div class="sea-creature fish1">🐠</div>
    <div class="sea-creature fish2">🐟</div>
    <div class="sea-creature turtle">🐢</div>
    <div class="sea-creature jellyfish">🪼</div>

    <!-- 🫧 RISING BUBBLES 🫧 -->
    <div class="bubble" style="left: 10%; width: 30px; height: 30px; animation-duration: 7s; animation-delay: 1s;"></div>
    <div class="bubble" style="left: 30%; width: 15px; height: 15px; animation-duration: 5s; animation-delay: 2s;"></div>
    <div class="bubble" style="left: 55%; width: 40px; height: 40px; animation-duration: 9s; animation-delay: 0s;"></div>
    <div class="bubble" style="left: 80%; width: 25px; height: 25px; animation-duration: 6s; animation-delay: 3s;"></div>

    <!-- MAIN UI CARD -->
    <div class="hero-card">
        <h1>Aqua Explorer</h1>
        <p>Descend into the greatest mysteries of our planet. Discover mesmerizing marine life, explore uncharted depths, and interact with our AI Ocean Guide.</p>
        <div class="cta-text">Click the Chat Icon to Dive In 🌊</div>
    </div>

    <!-- 🔥 WATSON CHATBOT SCRIPT 🔥 -->
    <script>
      window.watsonAssistantChatOptions = {
        integrationID: "d1494679-4cd3-4ea0-bb19-01059fcbebd5", 
        region: "https://integrations.eu-de.assistant.watson.appdomain.cloud", 
        serviceInstanceID: "07759be1-4cde-4477-8582-0f1ddeaba834", 
        onLoad: async (instance) => { await instance.render(); }
      };
      setTimeout(function(){
        const t=document.createElement('script');
        t.src="https://web-chat.global.assistant.watson.appdomain.cloud/versions/" + (window.watsonAssistantChatOptions.clientVersion || 'latest') + "/WatsonAssistantChatEntry.js";
        document.head.appendChild(t);
      });
    </script>

</body>
</html>
